<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC and Network Support - Black Candle Labs</title>
    <link rel="icon" type="image/x-icon" href="logos/favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logos/Black Mage.jpg" alt="Black Candle Labs Logo" class="logo-img">
            <h1>Black Candle Labs</h1>
        </div>
    </header>

    <main>
        <section class="service-page">
            <a class="back-link" href="index.html">Back to main page</a>
            <h2>PC and Network Support</h2>
            <p class="page-intro">Tell me what is going on with your computer, device, Wi-Fi, printer, or network. I will use this information to understand the problem before we connect.</p>

            <form class="support-form" action="#" method="post">
                <label for="support-name">Name</label>
                <input id="support-name" name="name" type="text" autocomplete="name" required>

                <label for="support-email">Email</label>
                <input id="support-email" name="email" type="email" autocomplete="email" required>

                <label for="support-phone">Phone</label>
                <input id="support-phone" name="phone" type="tel" autocomplete="tel">

                <label for="support-device">Device or network type</label>
                <input id="support-device" name="device" type="text" placeholder="Windows PC, laptop, router, printer, Wi-Fi, etc.">

                <label for="support-issue">What do you need help with?</label>
                <textarea id="support-issue" name="issue" rows="7" placeholder="Describe the problem, any error messages, and what you have already tried." required></textarea>

                <button class="form-button" type="submit">Submit Support Request</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Black Candle Labs. All rights reserved.</p>
    </footer>
</body>
</html>
